    questions:[{icon:"ti-message-circle",label:"소통",qs:["말하기 어려운 주제가 생겼을 때 나는 어떻게 반응해?","지금 연인에게 하고 싶었는데 못 했던 말 있어? 지금 해봐."]},{icon:"ti-bolt",label:"갈등",qs:["우리가 반복적으로 부딪히는 주제가 있어?","갈등 중에 내가 절대 하지 말았으면 하는 행동이 있어?"]},{icon:"ti-heart",label:"사랑언어",qs:["내가 사랑받는다고 가장 크게 느끼는 순간이 언제야?","연인이 표현하는 방식 중 가장 좋은 것과 아쉬운 것이 뭐야?"]},{icon:"ti-users",label:"친밀감",qs:["연인에게 아직 보여주지 못한 모습이 있어?","이 관계에서 가장 안전하다고 느끼는 순간이 언제야?"]},{icon:"ti-home",label:"생활패턴",qs:["함께 살게 된다면 가장 걱정되는 생활 습관 차이가 뭐야?","지금 생활 패턴에서 연인 때문에 불편한 부분이 있어?"]},{icon:"ti-coin",label:"소비가치관",qs:["돈 얘기를 꺼내기 불편했던 적 있어?","미래에 함께 돈을 어떻게 관리하고 싶어?"]},{icon:"ti-telescope",label:"미래비전",qs:["이 관계가 나에게 어떤 의미야? 솔직하게 얘기해봐.","10년 후 우리가 어떤 모습이면 좋겠어?"]}]
  }
};

const DIM_NAMES = ["D1 · 감정표현 & 소통방식","D2 · 갈등 해소 스타일","D3 · 사랑 표현 언어","D4 · 친밀감 & 독립성","D5 · 생활패턴 & 라이프","D6 · 돈에 대한 태도","D7 · 미래 비전 & 우선순위"];
const DIM_ICONS = ["ti-message-circle","ti-bolt","ti-heart","ti-users","ti-home","ti-coin","ti-telescope"];

async function init() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");
  if (!email) { showError("이메일 정보가 없어요."); return; }
  try {
    const res = await fetch(`${API_URL}?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (!data || !data.grade) { showError("결과를 찾을 수 없어요."); return; }
    renderResult(data);
  } catch (err) {
    showError("데이터를 불러오지 못했어요.");
  }
}

function renderResult(data) {
  const gradeKey = data.grade.substring(0, 3);
  const combo = `${data.hml1}-${data.hml2}-${data.hml3}`;
  const cfg = GRADE_CONFIG[gradeKey] || GRADE_CONFIG["4등급"];
  const content = CONTENT[combo] || CONTENT["default"];
  const hml1 = HML_CONFIG[data.hml1] || HML_CONFIG["M"];
  const hml2 = HML_CONFIG[data.hml2] || HML_CONFIG["M"];
  const hml3 = HML_CONFIG[data.hml3] || HML_CONFIG["M"];
  const email = new URLSearchParams(window.location.search).get("email");

  // D1~D7 실제 데이터 사용
  const dimScores = [
    data.d1 || 0,
    data.d2 || 0,
    data.d3 || 0,
    data.d4 || 0,
    data.d5 || 0,
    data.d6 || 0,
    data.d7 || 0
  ];

  document.getElementById("app").innerHTML = `
    <div class="hero" style="background:${cfg.bg}">
      <div class="hero-badge" style="background:${cfg.badge_bg};color:${cfg.badge_color}">${gradeKey} · ${combo}</div>
      <div class="hero-avatar-row">
        <div class="hero-avatar" style="background:${cfg.avatar_bg};color:${cfg.avatar_color}">A</div>
        <span style="font-size:28px">🤍</span>
        <div class="hero-avatar" style="background:${cfg.avatar_bg};color:${cfg.avatar_color}">B</div>
      </div>
      <div class="hero-title" style="color:${cfg.title_color}">${content.name}</div>
      <div class="hero-nick" style="color:${cfg.nick_color}">${content.nick}</div>
      <div class="hero-desc" style="color:${cfg.desc_color}">${content.desc}</div>
    </div>

    <div class="score-grid">
      <div class="score-card">
        <div class="score-label">소통 & 갈등</div>
        <div class="score-val">${data.score1}%</div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${data.score1}%;background:${cfg.bar_color}"></div></div>
        <span class="score-tag" style="background:${hml1.bg};color:${hml1.color}">${hml1.label}</span>
      </div>
      <div class="score-card">
        <div class="score-label">감정 & 라이프</div>
        <div class="score-val">${data.score2}%</div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${data.score2}%;background:${cfg.bar_color}"></div></div>
        <span class="score-tag" style="background:${hml2.bg};color:${hml2.color}">${hml2.label}</span>
      </div>
      <div class="score-card">
        <div class="score-label">가치관 & 미래</div>
        <div class="score-val">${data.score3}%</div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${data.score3}%;background:${cfg.bar_color}"></div></div>
        <span class="score-tag" style="background:${HML_CONFIG[data.hml3].bg};color:${HML_CONFIG[data.hml3].color}">${HML_CONFIG[data.hml3].label}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-chart-bar"></i> 차원별 상세 점수</div>
      ${dimScores.map((score, i) => `
        <div class="dim-row">
          <div class="dim-header">
            <div class="dim-name"><i class="ti ${DIM_ICONS[i]}"></i>${DIM_NAMES[i]}</div>
            <div class="dim-pct">${score}%</div>
          </div>
          <div class="dim-bar-wrap"><div class="dim-bar" style="width:${score}%;background:${cfg.bar_color}"></div></div>
        </div>
      `).join("")}
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-star"></i> 강점 & 주의점</div>
      <p style="font-size:12px;color:#7F77DD;font-weight:600;margin-bottom:8px">💪 강점</p>
      <ul class="strength-list">
        ${content.strengths.map(s => `<li>${s}</li>`).join("")}
      </ul>
      <p style="font-size:12px;color:#B42318;font-weight:600;margin:16px 0 8px">⚠️ 주의점</p>
      <ul class="strength-list">
        ${content.cautions.map(c => `<li>${c}</li>`).join("")}
      </ul>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-flag"></i> 지금 바로 해볼 미션</div>
      <ul class="mission-list">
        ${content.missions.map(m => `<li>${m}</li>`).join("")}
      </ul>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-messages"></i> 대화 질문지 — 더 깊이 알아가기</div>
      ${content.questions.map(q => `
        <div class="qa-section">
          <div class="qa-icon-row">
            <i class="ti ${q.icon} qa-icon"></i>
            <span class="qa-label">${q.label}</span>
          </div>
          <ul class="qa-list">
            ${q.qs.map(question => `<li>${question}</li>`).join("")}
          </ul>
        </div>
      `).join("")}
    </div>

    <div class="share-card">
      <div class="share-preview" style="background:${cfg.bg}">
        <div class="share-preview-grade" style="color:${cfg.badge_color}">${gradeKey} · ${combo}</div>
        <div class="share-preview-title" style="color:${cfg.title_color}">${content.name} ${content.nick}</div>
        <div class="share-preview-scores">
          <div class="share-preview-score">
            <div class="share-preview-score-label" style="color:${cfg.nick_color}">소통&갈등</div>
            <div class="share-preview-score-val" style="color:${cfg.title_color}">${data.score1}%</div>
          </div>
          <div class="share-preview-score">
            <div class="share-preview-score-label" style="color:${cfg.nick_color}">감정&라이프</div>
            <div class="share-preview-score-val" style="color:${cfg.title_color}">${data.score2}%</div>
          </div>
          <div class="share-preview-score">
            <div class="share-preview-score-label" style="color:${cfg.nick_color}">가치관&미래</div>
            <div class="share-preview-score-val" style="color:${cfg.title_color}">${data.score3}%</div>
          </div>
        </div>
      </div>
      <div class="share-btn-row">
        <button class="share-btn kakao-btn" onclick="shareKakao('${gradeKey}', '${combo}', '${content.name}')">🗨️ 카카오 공유</button>
        <button class="share-btn link-btn" onclick="copyLink()">🔗 링크 복사</button>
      </div>
    </div>

    <button class="retest-btn" onclick="location.href='${FORMS_URL}'">🔄 테스트 다시 하기</button>

    <div class="notice">
      관계는 가꾸지 않으면 변해요.<br>
      3개월 후 다시 테스트해서 변화를 확인해보세요.<br>
      지금 이 순간도 소중히 여겨주세요. 💜
    </div>
  `;
}

function shareKakao(gradeKey, combo, name) {
  const msg = `우리 커플 궁합 테스트했더니 ${gradeKey} ${name} 나왔어 💕 너도 해봐!`;
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: '커플챌린지 · 우리 커플 궁합 테스트',
      description: msg,
      imageUrl: 'https://sobh0326-cmd.github.io/Couple-challenge/og-image.png',
      link: {
        mobileWebUrl: `${BASE_URL}/start.html`,
        webUrl: `${BASE_URL}/start.html`,
      },
    },
    buttons: [
      {
        title: '나도 테스트 하기',
        link: {
          mobileWebUrl: `${BASE_URL}/start.html`,
          webUrl: `${BASE_URL}/start.html`,
        },
      },
      {
        title: '결과 확인하기',
        link: {
          mobileWebUrl: `${BASE_URL}/result.html`,
          webUrl: `${BASE_URL}/result.html`,
        },
      },
    ],
  });
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    alert("링크가 복사됐어요!");
  });
}

function showError(msg) {
  document.getElementById("app").innerHTML = `
    <div class="error-box">
      <p style="font-size:32px;margin-bottom:12px">😢</p>
      <p style="color:#999;font-size:14px;line-height:1.6">${msg}</p>
    </div>
  `;
}

init();
</script>
</body>
</html>
