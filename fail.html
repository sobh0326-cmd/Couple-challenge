<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f5;padding:16px;max-width:430px;margin:0 auto;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;padding:40px 24px;text-align:center;width:100%}
.icon{font-size:48px;margin-bottom:16px}
.title{font-size:20px;font-weight:600;color:#111;margin-bottom:8px}
.desc{font-size:14px;color:#666;line-height:1.7;margin-bottom:28px}
.btn-primary{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;border:none;background:#7F77DD;color:#fff;margin-bottom:10px}
.btn-secondary{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;border:1px solid #e5e5e5;background:#fff;color:#666}
</style>
</head>
<body>
<div class="card">
  <div class="icon">😢</div>
  <div class="title">결제가 완료되지 않았어요</div>
  <div class="desc">
    결제 중 문제가 발생했거나<br>
    취소하셨어요.<br><br>
    무료 결과는 아래 버튼으로 다시 확인할 수 있어요.
  </div>
  <button class="btn-primary" onclick="goBack()">무료 결과 다시 보기</button>
  <button class="btn-secondary" onclick="retryPayment()">결제 다시 시도하기</button>
</div>

<script>
function goBack() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");
  if (email) {
    location.href = `https://sobh0326-cmd.github.io/Couple-challenge/?email=${encodeURIComponent(email)}`;
  } else {
    location.href = "https://sobh0326-cmd.github.io/Couple-challenge/";
  }
}

function retryPayment() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");
  if (email) {
    location.href = `https://sobh0326-cmd.github.io/Couple-challenge/?email=${encodeURIComponent(email)}`;
  } else {
    location.href = "https://sobh0326-cmd.github.io/Couple-challenge/";
  }
}
</script>
</body>
</html>
