<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커플챌린지 결과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f5;padding:16px;max-width:430px;margin:0 auto}
.hero{background:#EEEDFE;border-radius:16px;padding:28px 24px;margin-bottom:16px;text-align:center}
.hero-badge{font-size:11px;font-weight:500;color:#534AB7;background:#CECBF6;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:14px}
.hero-avatar-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.hero-avatar{width:56px;height:56px;border-radius:50%;background:#CECBF6;display:flex;align-items:center;justify-content:center;font-size:22px;color:#3C3489;font-weight:500}
.hero-title{font-size:24px;font-weight:500;color:#26215C;margin-bottom:4px}
.hero-nick{font-size:14px;color:#534AB7;margin-bottom:10px}
.hero-desc{font-size:13px;color:#3C3489;line-height:1.7}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.score-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:16px;padding:14px;text-align:center}
.score-label{font-size:11px;color:#999;margin-bottom:6px}
.score-val{font-size:22px;font-weight:500;color:#111;margin-bottom:4px}
.score-bar-wrap{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin-bottom:6px}
.score-bar{height:4px;border-radius:2px;background:#7F77DD}
.score-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;display:inline-block;background:#EEEDFE;color:#534AB7}
.lock-box{background:#fff;border:0.5px solid #e5e5e5;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.lock-icon{font-size:32px;margin-bottom:12px}
.lock-title{font-size:16px;font-weight:500;color:#111;margin-bottom:8px}
.lock-desc{font-size:13px;color:#666;margin-bottom:16px;line-height:1.6}
.lock-btn{background:#7F77DD;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:500;cursor:pointer;width:100%}
.lock-sub{font-size:11px;color:#999;margin-top:8px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">3등급 · M-M-H</div>
  <div class="hero-avatar-row">
    <div class="hero-avatar">A</div>
    <span style="font-size:28px">🤍</span>
    <div class="hero-avatar">B</div>
  </div>
  <div class="hero-title">삼삼하게 좋은 커플</div>
  <div class="hero-nick">(삼삼커)</div>
  <div class="hero-desc">딱 맞지 않아도 괜찮아요. 함께 맞춰가는 과정이 우리만의 매력이에요.</div>
</div>

<div class="score-grid">
  <div class="score-card">
    <div class="score-label">소통 & 갈등</div>
    <div class="score-val">66%</div>
    <div class="score-bar-wrap"><div class="score-bar" style="width:66%"></div></div>
    <span class="score-tag">M · 중간</span>
  </div>
  <div class="score-card">
    <div class="score-label">감정 & 라이프</div>
    <div class="score-val">71%</div>
    <div class="score-bar-wrap"><div class="score-bar" style="width:71%"></div></div>
    <span class="score-tag">M · 중간</span>
  </div>
  <div class="score-card">
    <div class="score-label">가치관 & 미래</div>
    <div class="score-val">76%</div>
    <div class="score-bar-wrap"><div class="score-bar" style="width:76%"></div></div>
    <span class="score-tag" style="background:#E1F5EE;color:#0F6E56">H · 높음</span>
  </div>
</div>

<div class="lock-box">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">상세 결과 보기</div>
  <div class="lock-desc">차원별 상세 점수 7개, 강점 & 주의점,<br>등급 올리기 미션, 대화 질문지까지<br>모두 확인할 수 있어요.</div>
  <button class="lock-btn">결과 전체 보기 · 3,900원</button>
  <div class="lock-sub">커플 둘이 나누면 1인당 1,950원</div>
</div>

</body>
</html>
