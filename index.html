body{background:#f5f5f5;padding:16px;max-width:430px;margin:0 auto}
.loading{text-align:center;padding:80px 24px;color:#999;font-size:14px}
.loading-spinner{font-size:32px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block}

.error-box{background:#fff;border-radius:16px;padding:40px 24px;text-align:center;margin-top:40px}
.error-box p{color:#999;font-size:14px;line-height:1.6}

/* 히어로 */
.hero{border-radius:16px;padding:28px 24px 24px;margin-bottom:16px;text-align:center}
.hero-grade-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}

.hero-title{font-size:24px;font-weight:500;margin-bottom:4px}
.hero-nick{font-size:14px;margin-bottom:10px}
.hero-desc{font-size:13px;line-height:1.7;margin-bottom:16px}
.hero-upgrade-hint{font-size:12px;padding:10px 14px;border-radius:10px;opacity:0.85;line-height:1.6}

/* 점수 */

.score-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:16px;padding:14px;text-align:center}
.score-label{font-size:11px;color:#999;margin-bottom:6px}

.score-bar-wrap{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin-bottom:6px}
.score-bar{height:4px;border-radius:2px}
.score-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;display:inline-block}

.share-title{font-size:14px;font-weight:500;color:#111;margin-bottom:6px}
.share-desc{font-size:12px;color:#999;margin-bottom:14px;line-height:1.5}
.kakao-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#FEE500;color:#3C1E1E;border:none;border-radius:12px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:opacity 0.2s}

.kakao-btn img{width:20px;height:20px}

.lock-hook{font-size:15px;font-weight:600;color:#111;line-height:1.6;margin-bottom:6px;text-align:center}

.lock-feature-item{background:#f8f7ff;border-radius:12px;padding:12px;text-align:center}

.lock-feature-label{font-size:12px;font-weight:600;color:#534AB7;margin-bottom:2px}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");
  if (!email) { showError("이메일 정보가 없어요.<br>테스트를 먼저 완료해주세요."); return; }
  try {
    const res = await fetch(`${API_URL}?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (!data || !data.grade) { showError("결과를 찾을 수 없어요.<br>테스트를 완료했는지 확인해주세요."); return; }
    renderResult(data);

    showError("데이터를 불러오지 못했어요.<br>잠시 후 다시 시도해주세요.");
  }
}

        </div>
        <div class="lock-feature-item">
          <div class="lock-feature-icon">🎯</div>
          <div class="lock-feature-label">등급 올리기 미션</div>
          <div class="lock-feature-desc">우리 커플 맞춤<br>미션 3개</div>
        </div>
        <div class="lock-feature-item">
          <div class="lock-feature-icon">💬</div>
          <div class="lock-feature-label">대화 질문지 14개</div>
          <div class="lock-feature-desc">한 번도 안 해본<br>깊은 대화 시작</div>
        </div>
      </div>

      <button class="lock-btn" id="payBtn">결과 전체 보기 · 3,900원</button>
      <div class="lock-price-hint">커플 둘이 나누면 1인당 1,950원</div>
    </div>
  `;

  document.getElementById("payBtn").addEventListener("click", () => handlePayment(email));

  const gaugeMap = {"1등급":{top:"12.5%",color:"#FFB800",border:"#CC9200",rowId:"grade1row",name:"일편단심 커플"},"2등급":{top:"37.5%",color:"#FF7A2F",border:"#CC5500",rowId:"grade2row",name:"이심전심 커플"},"3등급":{top:"62.5%",color:"#7B6EFF",border:"#5A4FFF",rowId:"grade3row",name:"삼삼하게 좋은 커플"},"4등급":{top:"87.5%",color:"#B0AFBA",border:"#888",rowId:"grade4row",name:"사뿐사뿐 커플"}};
  const gCfg = gaugeMap[gradeKey] || gaugeMap["3등급"];
  const pointer = document.getElementById("gaugePointer");
  if (pointer) {
    pointer.style.top = gCfg.top;
    pointer.style.borderColor = gCfg.border;
    pointer.querySelector("div").style.background = gCfg.border;
  }
  const activeRow = document.getElementById(gCfg.rowId);
  if (activeRow) {
    const bgMap = {"1등급":"#FFF8E1","2등급":"#FFF0E6","3등급":"#EEEDFE","4등급":"#F5F5F5"};
    activeRow.style.background = bgMap[gradeKey] || "#EEEDFE";
    activeRow.style.border = "1.5px solid " + gCfg.color;
    const nameEl = activeRow.querySelectorAll("div div")[0];
    const nickEl = activeRow.querySelectorAll("div div")[1];
    if (nameEl) {
      nameEl.style.color = gCfg.border;
      nameEl.style.fontWeight = "500";
      nameEl.innerHTML = gradeKey + ' <span style="font-size:10px;background:'+gCfg.color+';color:white;padding:1px 6px;border-radius:6px;vertical-align:middle;">우리 커플</span>';
    }
    if (nickEl) { nickEl.style.color = gCfg.color; }
  }
}

function shareKakao(gradeKey, msg) {
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: '커플챌린지 · 우리 커플 궁합 테스트',
      description: msg,
      imageUrl: 'https://sobh0326-cmd.github.io/Couple-challenge/og-image.png',
      link: {
        mobileWebUrl: `${BASE_URL}/start.html`,
        webUrl: `${BASE_URL}/start.html`,
      },
    },
    buttons: [
      {title:'나도 테스트 하기',link:{mobileWebUrl:`${BASE_URL}/start.html`,webUrl:`${BASE_URL}/start.html`}},
      {title:'결과 확인하기',link:{mobileWebUrl:`${BASE_URL}/result.html`,webUrl:`${BASE_URL}/result.html`}}
    ],
  });
}

function handlePayment(email) {
  try {
    const tossPayments = TossPayments(TOSS_CLIENT_KEY);
    const orderId = "order_" + Date.now();
    tossPayments.requestPayment("카드", {
      amount: 3900,
      orderId: orderId,
      orderName: "커플챌린지 상세 결과",
      customerEmail: email,
      successUrl: `${BASE_URL}/success.html?email=${encodeURIComponent(email)}`,
      failUrl: `${BASE_URL}/fail.html`,
    });
  } catch (err) {
    console.error("결제 에러:", err);
    alert("결제 오류: " + (err.message || "다시 시도해주세요."));
  }
}

function showError(msg) {
  document.getElementById("app").innerHTML = `
    <div class="error-box">
      <p style="font-size:32px;margin-bottom:12px">😢</p>
      <p>${msg}</p>
    </div>
  `;
}

init();
</script>
