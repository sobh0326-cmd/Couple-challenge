<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커플챌린지 · 테스트 시작</title>
<meta http-equiv="refresh" content="2;url=https://docs.google.com/forms/d/e/1FAIpQLScI5z4gKdZEFpV2GNciWQHlHyqmpbQ_Mu5BORF_IbXxTKhTOA/viewform?usp=dialog">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:40px 28px;text-align:center;max-width:360px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.emoji{font-size:52px;margin-bottom:20px;animation:bounce 1s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.title{font-size:20px;font-weight:600;color:#111;margin-bottom:10px}
.desc{font-size:14px;color:#888;line-height:1.7;margin-bottom:28px}
.progress{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin-bottom:20px}
.progress-bar{height:4px;background:#7F77DD;border-radius:2px;animation:load 2s linear forwards}
@keyframes load{from{width:0%}to{width:100%}}
.btn{display:inline-block;background:#7F77DD;color:#fff;border:none;border-radius:12px;padding:13px 28px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity 0.2s}
.btn:hover{opacity:0.88}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">💑</div>
  <div class="title">테스트 시작할게요!</div>
  <div class="desc">잠시 후 테스트 페이지로<br>자동으로 이동해요.</div>
  <div class="progress"><div class="progress-bar"></div></div>
  <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScI5z4gKdZEFpV2GNciWQHlHyqmpbQ_Mu5BORF_IbXxTKhTOA/viewform?usp=dialog">바로 이동하기</a>
</div>
<script>
setTimeout(function(){
  window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLScI5z4gKdZEFpV2GNciWQHlHyqmpbQ_Mu5BORF_IbXxTKhTOA/viewform?usp=dialog";
}, 2000);
</script>
</body>
</html>
